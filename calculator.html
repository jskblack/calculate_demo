<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳計算機</title>
<style>
body { font-family: Arial; margin: 0; padding: 10px; background:#f5f5f5; }
.container { max-width: 500px; margin:auto; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
button { width:100%; padding:10px; margin-top:5px; border:none; border-radius:8px; background:#4CAF50; color:white; font-size:16px; }
input, select { width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ccc; }
</style>
</head>
<body>
<div class="container">

<div class="card">
<h3>📟 計算機</h3>
<input id="calcInput" placeholder="例如 10+5*2">
<button onclick="calculate()">計算</button>
<p id="calcResult"></p>
</div>

<div class="card">
<h3>📒 記帳</h3>
<select id="type">
<option value="in">收入</option>
<option value="out">支出</option>
</select>
<input id="amount" type="number" placeholder="金額">
<input id="note" placeholder="備註">
<button onclick="addRecord()">新增</button>
</div>

<div class="card">
<h3>📊 總覽</h3>
<button onclick="showRecords()">查看</button>
<div id="records"></div>
</div>

<div class="card">
<h3>💱 匯率（台幣）</h3>
<input id="twd" type="number" placeholder="輸入台幣">
<button onclick="convert()">轉換</button>
<p id="exchange"></p>
</div>

</div>

<script>
let records = [];

function calculate(){
  let input = document.getElementById('calcInput').value;
  try{
    document.getElementById('calcResult').innerText = eval(input);
  }catch{
    document.getElementById('calcResult').innerText = '錯誤';
  }
}

function addRecord(){
  let type = document.getElementById('type').value;
  let amount = parseFloat(document.getElementById('amount').value);
  let note = document.getElementById('note').value;
  records.push({type, amount, note});
  alert('已新增');
}

function showRecords(){
  let html = '';
  let totalIn = 0;
  let totalOut = 0;

  records.forEach(r=>{
    html += `<p>${r.type} ${r.amount} (${r.note})</p>`;
    if(r.type==='in') totalIn += r.amount;
    else totalOut += r.amount;
  });

  html += `<hr>收入:${totalIn} 支出:${totalOut} 結餘:${totalIn-totalOut}`;
  document.getElementById('records').innerHTML = html;
}

async function convert(){
  let twd = document.getElementById('twd').value;
  try{
    let res = await fetch('https://api.exchangerate-api.com/v4/latest/TWD');
    let data = await res.json();

    let usd = twd * data.rates.USD;
    let jpy = twd * data.rates.JPY;
    let eur = twd * data.rates.EUR;
    let cny = twd * data.rates.CNY;

    document.getElementById('exchange').innerText = 
      `USD:${usd.toFixed(2)} JPY:${jpy.toFixed(2)} EUR:${eur.toFixed(2)} CNY:${cny.toFixed(2)}`;
  }catch{
    document.getElementById('exchange').innerText = '匯率取得失敗';
  }
}
</script>

</body>
</html>
